<title>資金管理</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
    --accent: #f0b90b; --accent2: #3b82f6; --accent3: #f472b6;
    --btc: #f7931a; --eth: #627eea; --xrp: #00aae4; --sol: #9945ff;
    --text: #e8e8f0; --muted: #6b6b88; --green: #22c55e; --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding: 0 0 40px; }

  /* ---- Lock Screen ---- */
  #lockScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; gap: 24px;
  }
  #lockScreen .lock-icon { font-size: 48px; }
  #lockScreen h2 { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
  #lockScreen .pin-dots { display: flex; gap: 16px; margin: 8px 0; }
  #lockScreen .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--muted); background: transparent; transition: all 0.15s; }
  #lockScreen .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  #lockScreen .pin-dot.error { background: var(--red); border-color: var(--red); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
  .pin-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; cursor: pointer; transition: all 0.1s; }
  .pin-btn:active { background: var(--surface2); transform: scale(0.93); }
  .pin-btn.del { font-size: 18px; background: transparent; border-color: transparent; color: var(--muted); }
  .pin-error-msg { font-size: 12px; color: var(--red); height: 16px; }

  /* ---- App ---- */
  #appContent { display: none; }
  .tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }

function pinInput(n) {
  if (currentPin.length >= 4) return;
  currentPin += n;
  updateDots();
  if (currentPin.length === 4) {
    setTimeout(checkPin, 100);
  }
}
function pinDelete() {
  currentPin = currentPin.slice(0, -1);
  updateDots();
  document.getElementById('pinError').textContent = '';
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < currentPin.length);
    d.classList.remove('error');
  }
}
function checkPin() {
  if (currentPin === CORRECT_PIN) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
  } else {
    for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.add('error');
    document.getElementById('pinError').textContent = 'PINが違います';
    setTimeout(() => { currentPin = ''; updateDots(); document.getElementById('pinError').textContent = ''; }, 1000);
  }
}

function switchTab(tab,btn){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');btn.classList.add('active');}
function fmt(n){return '¥'+Math.round(n).toLocaleString('ja-JP');}
function today(){const d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function cryptoTotal(){return COINS.reduce((s,c)=>s+cryptoState.totals[c],0);}
function ratioTotal(){return COINS.reduce((s,c)=>s+(parseInt(cryptoState.ratios[c])||0),0);}
function renderCrypto(){
  document.getElementById('totalAmount').textContent=fmt(cryptoTotal());
  const tot=cryptoTotal();
  document.getElementById('coinsGrid').innerHTML=COINS.map(coin=>{const pct=tot>0?((cryptoState.totals[coin]/tot)*100).toFixed(1):0;return `<div class="coin-card" data-coin="${coin}"><div class="coin-header"><div class="coin-dot"></div><span class="coin-name">${coin}</span></div><div class="coin-amount">${fmt(cryptoState.totals[coin])}</div><div class="coin-ratio">${pct}%</div></div>`;}).join('');
  document.getElementById('ratioConfig').innerHTML=COINS.map(coin=>`<div class="extra-row"><span class="extra-coin-label" data-coin="${coin}">${coin}</span><input class="extra-input" type="number" value="${cryptoState.ratios[coin]||0}" min="0" step="500" oninput="updateRatio('${coin}',this.value)"></div>`).join('');
  updateConfigCheck();
  document.getElementById('monthlyHint').textContent='合計 '+fmt(ratioTotal());
  document.getElementById('extraInputs').innerHTML=COINS.map(coin=>`<div class="extra-row"><span class="extra-coin-label" data-coin="${coin}">${coin}</span><input class="extra-input" id="extra_${coin}" type="number" placeholder="0" min="0" step="100"></div>`).join('');
  renderCryptoHistory();
  saveLS('cryptoTracker',cryptoState);
}
function updateConfigCheck(){const total=ratioTotal();const el=document.getElementById('configCheck');el.textContent='合計 '+fmt(total);el.className='config-total-check '+(total>0?'ok':'ng');}
function updateRatio(coin,val){cryptoState.ratios[coin]=parseInt(val)||0;updateConfigCheck();document.getElementById('monthlyHint').textContent='合計 '+fmt(ratioTotal());saveLS('cryptoTracker',cryptoState);}
function addMonthly(){const total=ratioTotal();if(total===0){showToast('入金額を設定してください');return;}const entry={date:today(),type:'月次',items:{},total};COINS.forEach(coin=>{const add=cryptoState.ratios[coin]||0;cryptoState.totals[coin]+=add;entry.items[coin]=add;});cryptoState.history.unshift(entry);renderCrypto();showToast('今月分 '+fmt(total)+' を入金しました');}
function applyExtra(){const entry={date:today(),type:'臨時',items:{},total:0};let added=false;COINS.forEach(coin=>{const val=parseInt(document.getElementById('extra_'+coin)?.value)||0;if(val>0){cryptoState.totals[coin]+=val;entry.items[coin]=val;entry.total+=val;added=true;}});if(!added){showToast('金額を入力してください');return;}cryptoState.history.unshift(entry);renderCrypto();toggleExtra(true);showToast('臨時入金 '+fmt(entry.total)+' を追加しました');}
function renderCryptoHistory(){const list=document.getElementById('historyList');if(!cryptoState.history.length){list.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0">履歴はありません</div>';return;}list.innerHTML=cryptoState.history.slice(0,30).map(h=>{const tags=COINS.filter(c=>h.items[c]>0).map(c=>`<span class="history-tag" data-coin="${c}">${c} ${fmt(h.items[c])}</span>`).join('');const tc=h.type==='月次'?'color:var(--accent)':' color:var(--accent2)';return `<div class="history-item"><div><div class="history-date">${h.date}</div><div class="history-type" style="${tc}">${h.type}</div></div><div style="text-align:right"><div class="history-coins">${tags}</div><div class="history-total">${fmt(h.total)}</div></div></div>`;}).join('');}
function toggleExtra(forceClose){const toggle=document.getElementById('extraToggle'),body=document.getElementById('extraBody');const open=body.classList.contains('open');if(forceClose||open){body.classList.remove('open');toggle.classList.remove('open');}else{body.classList.add('open');toggle.classList.add('open');}}
function showExport(){const box=document.getElementById('exportBox'),ta=document.getElementById('exportText');if(box.style.display!=='none'){box.style.display='none';return;}const lines=['仮想通貨　入金履歴','',`出力日　${today()}`,'',`合計　${Math.round(cryptoTotal()).toLocaleString('ja-JP')}`,'','入金'];COINS.forEach(c=>lines.push(`${c}     ${Math.round(cryptoState.totals[c]).toLocaleString('ja-JP')}`));if(cryptoState.history.length){lines.push('','--- 入金履歴 ---');cryptoState.history.forEach(h=>{const items=COINS.filter(c=>h.items[c]>0).map(c=>`${c} ${Math.round(h.items[c]).toLocaleString('ja-JP')}`).join('  ');lines.push(`${h.date}  [${h.type}]  ${items}  合計 ${Math.round(h.total).toLocaleString('ja-JP')}`);});}ta.value=lines.join('\n');box.style.display='block';}
function copyExport(){const ta=document.getElementById('exportText');navigator.clipboard.writeText(ta.value).then(()=>showToast('コピーしました')).catch(()=>{ta.select();document.execCommand('copy');showToast('コピーしました');});}
function savingsGrandTotal(){return savingsState.history.reduce((s,h)=>s+h.amount,0);}
function papaTotalAmt(){return savingsState.history.filter(h=>h.isPapa).reduce((s,h)=>s+h.amount,0);}
function otherTotalAmt(){return savingsState.history.filter(h=>!h.isPapa).reduce((s,h)=>s+h.amount,0);}
function renderSavings(){
  document.getElementById('savingsTotal').textContent=fmt(savingsGrandTotal());
  document.getElementById('papaTotal').textContent=fmt(papaTotalAmt());
  document.getElementById('otherTotal').textContent=fmt(otherTotalAmt());
  const map={};savingsState.history.forEach(h=>{map[h.sender]=(map[h.sender]||0)+h.amount;});
  document.getElementById('senderBreakdown').innerHTML=Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([name,amt])=>{const cls=name==='パパ'?'color:var(--accent2)':' color:var(--accent3)';return `<div class="breakdown-row"><span class="breakdown-name">${name}</span><span class="breakdown-amt" style="${cls}">${fmt(amt)}</span></div>`;}).join('');
  renderSavingsHistory();
  saveLS('savingsTracker',savingsState);
}
function renderSavingsHistory(){const list=document.getElementById('savingsHistoryList');const sorted=[...savingsState.history].sort((a,b)=>b.date.localeCompare(a.date));list.innerHTML=sorted.slice(0,50).map(h=>{const sc=h.isPapa?'papa':'other';const memo=h.memo?`<div class="savings-memo">${h.memo}</div>`:'';return `<div class="savings-history-item"><div><div class="history-date">${h.date}</div><span class="savings-sender ${sc}">${h.sender}</span>${memo}</div><div class="history-total savings">${fmt(h.amount)}</div></div>`;}).join('');}
let selectedSender='パパ';
function selectSender(btn){document.querySelectorAll('.sender-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedSender=btn.dataset.sender;}
function addSavingsMonthly(){savingsState.history.push({date:today(),amount:10000,sender:'パパ',memo:'月次',isPapa:true});renderSavings();showToast('パパの今月分 ¥10,000 を記録しました');}
function applySavings(){const amt=parseInt(document.getElementById('s_amount').value)||0;if(amt<=0){showToast('金額を入力してください');return;}const memo=document.getElementById('s_memo').value.trim();savingsState.history.push({date:today(),amount:amt,sender:selectedSender,memo,isPapa:selectedSender==='パパ'});renderSavings();document.getElementById('s_amount').value='';document.getElementById('s_memo').value='';toggleSavingsForm(true);showToast(selectedSender+' '+fmt(amt)+' を記録しました');}
function toggleSavingsForm(forceClose){const toggle=document.getElementById('savingsFormToggle'),body=document.getElementById('savingsFormBody');const open=body.classList.contains('open');if(forceClose||open){body.classList.remove('open');toggle.classList.remove('open');}else{body.classList.add('open');toggle.classList.add('open');}}
function showSavingsExport(){const box=document.getElementById('savingsExportBox'),ta=document.getElementById('savingsExportText');if(box.style.display!=='none'){box.style.display='none';return;}const sorted=[...savingsState.history].sort((a,b)=>a.date.localeCompare(b.date));const title=document.getElementById('savingsTitle').value||'KIDS SAVINGS';const lines=[title+' 貯金記録','',`出力日　${today()}`,'',`合計　${Math.round(savingsGrandTotal()).toLocaleString('ja-JP')}円`,'',`パパ合計　　${Math.round(papaTotalAmt()).toLocaleString('ja-JP')}円`,`その他合計　${Math.round(otherTotalAmt()).toLocaleString('ja-JP')}円`,'','--- 入金履歴 ---'];sorted.forEach(h=>{const memo=h.memo?`　${h.memo}`:'';lines.push(`${h.date}  +${Math.round(h.amount).toLocaleString('ja-JP')}円　${h.sender}${memo}`);});ta.value=lines.join('\n');box.style.display='block';}
function copySavingsExport(){const ta=document.getElementById('savingsExportText');navigator.clipboard.writeText(ta.value).then(()=>showToast('コピーしました')).catch(()=>{ta.select();document.execCommand('copy');showToast('コピーしました');});}
function saveSavingsTitle(){const val=document.getElementById('savingsTitle').value||'KIDS SAVINGS';document.getElementById('savingsTitleLabel').textContent=val+'の貯金額';document.getElementById('savingsTabBtn').textContent='🌸 '+val;saveLS('savingsTitle',val);}
function loadSavingsTitle(){const saved=loadLS('savingsTitle');if(saved){document.getElementById('savingsTitle').value=saved;document.getElementById('savingsTitleLabel').textContent=saved+'の貯金額';document.getElementById('savingsTabBtn').textContent='🌸 '+saved;}}
renderCrypto();
renderSavings();
loadSavingsTitle();
</script>
</body>
</html>
